project:
  name: cloud-chaser
  seed: 42
  device: cuda
  output_dir: runs

data:
  swimseg_root: data/swimseg-2
  gcd_root: data/GCD
  tjnu_root: data/TJNU
  prepared_seg_dir: data/processed/swimseg_cloud_yolo
  num_workers: 8
  image_size: 224
  val_fraction: 0.15
  seg_val_fraction: 0.10
  seg_test_fraction: 0.10
  classification_classes:
    - 1_cumulus
    - 2_altocumulus
    - 3_cirrus
    - 4_clearsky
    - 5_stratocumulus
    - 6_cumulonimbus
    - 7_mixed
  min_mask_area: 96
  swimseg_invert_masks: false

augmentation:
  random_shadow_p: 0.25
  gaussian_blur_p: 0.20
  hflip_p: 0.50
  vflip_p: 0.15

detector:
  model: yolo11s-seg.pt
  epochs: 30
  imgsz: 640
  batch: 8
  patience: 20
  lr0: 0.01
  weight_decay: 0.0005
  conf: 0.25
  iou: 0.60
  half: true

ssl:
  method: simclr
  backbone: resnet50
  projection_dim: 128
  hidden_dim: 2048
  batch_size: 64
  epochs: 100
  lr: 0.0003
  weight_decay: 0.000001
  temperature: 0.2

classifier:
  backbone: resnet50
  batch_size: 32
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001
  dropout: 0.2
  amp: true
  freeze_backbone_epochs: 2
  ssl_checkpoint: null
  checkpoint: runs/classifier/best.pt

inference:
  detector_weights: runs/detector/weights/best.pt
  classifier_weights: runs/classifier/best.pt
  output_dir: runs/inference
  crop_padding: 12
  mask_alpha: 0.42
