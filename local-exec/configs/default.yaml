project:
  name: cloud-chaser
  seed: 42
  device: cuda
  output_dir: ../results

data:
  swimseg_root: ../data/swimseg-2
  gcd_root: ../data/GCD
  prepared_seg_dir: ../data/processed/swimseg_cloud_yolo
  num_workers: 8
  image_size: 224
  val_fraction: 0.15
  seg_val_fraction: 0.10
  seg_test_fraction: 0.10
  classification_classes:
    - 1_cumulus
    - 2_altocumulus
    - 3_cirrus
    - 4_clearsky
    - 5_stratocumulus
    - 6_cumulonimbus
    - 7_mixed
  min_mask_area: 96
  swimseg_invert_masks: false

augmentation:
  random_shadow_p: 0.25
  gaussian_blur_p: 0.20
  hflip_p: 0.50
  vflip_p: 0.15

detector:
  backend: hybrid
  model: ../models/yolo11s-seg.pt
  epochs: 120
  imgsz: 640
  batch: 8
  patience: 35
  lr0: 0.01
  weight_decay: 0.0005
  conf: 0.25
  iou: 0.60
  half: true

unet:
  checkpoint: ../results/unet/best.pt
  epochs: 60
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.00001
  threshold: 0.45
  min_area: 256

classifier:
  backbone: resnet50
  batch_size: 32
  epochs: 80
  lr: 0.0001
  weight_decay: 0.0001
  dropout: 0.2
  amp: true
  freeze_backbone_epochs: 2
  checkpoint: ../results/classifier/best.pt

inference:
  detector_weights: ../results/detector/weights/best.pt
  classifier_weights: ../results/classifier/best.pt
  output_dir: ../results/inference
  crop_padding: 12
  mask_alpha: 0.42
